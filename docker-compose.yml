version: "3.8"

services:
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom
    restart: unless-stopped

    ports:
      - "127.0.0.1:8787:8787"        # 仅本机访问，不暴露到外网

    environment:
      # ─── 上游路由 ───────────────────────────────────────────
      # Claude Code / Anthropic 格式请求 → sub2api 中转站
      ANTHROPIC_TARGET_API_URL: "https://sub2api.example.com"
      # Codex / OAI 格式请求 → new-api 中转站
      OPENAI_TARGET_API_URL: "https://new-api.example.com/v1"
      # Gemini 请求（带 x-goog-api-key）→ gemini 中转站
      GEMINI_TARGET_API_URL: "https://gemini-proxy.example.com"
      # Vertex AI（如有需要）
      VERTEX_TARGET_API_URL: ""
      # Bedrock（如有需要）
      BEDROCK_TARGET_API_URL: ""
      # Codex 订阅用户的 ChatGPT 回退路由
      #（无需设置，默认 https://chatgpt.com）

      # ─── 网络与绑定 ────────────────────────────────────────
      HEADROOM_HOST: "0.0.0.0"        # 容器内监听所有网卡
      HEADROOM_PORT: "8787"           # 代理端口
      HEADROOM_MAX_CONNECTIONS: "500" # 最大上游 HTTP 连接数
      HEADROOM_HTTP2: "true"          # 启用 HTTP/2

      # ─── 压缩模式 ──────────────────────────────────────────
      # token 模式：激进压缩（PAYG 用户推荐）
      # subscription 模式：不压缩（订阅制用户）
      # passthrough 模式：不压缩，仅透传
      HEADROOM_MODE: "token"

      # ─── 预算与速率限制（安全兜底）────────────────────────
      HEADROOM_BUDGET: "100.0"        # 每日预算上限（美元）
      HEADROOM_BUDGET_PERIOD: "daily" # 周期：daily / weekly / monthly

      # ─── 压缩微调 ──────────────────────────────────────────
      HEADROOM_TARGET_RATIO: ""       # 目标压缩率（如 0.3 = 保留30%）
      HEADROOM_DISABLE_KOMPRESS: "false"
      HEADROOM_OUTPUT_SHAPER: "1"     # 输出侧 token 裁剪

      # ─── 日志 ──────────────────────────────────────────────
      # PYTHONUNBUFFERED 是镜像自带的，无需重复设置

    volumes:
      # 持久化 ~/.headroom（内存数据库、TOIN 学习数据等）
      - headroom-data:/home/nonroot/.headroom

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    # 资源限制（按需调整）
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
    #       cpus: "2"

volumes:
  headroom-data:
