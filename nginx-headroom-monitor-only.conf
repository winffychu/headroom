# ============================================================
# Nginx 配置：仅暴露 Headroom 监控/统计端点
# 通过 http://192.168.8.5/headroom/xxx 访问
# LLM 代理路由（/v1/*）不走 Nginx，仅本机访问
#
# 端点说明：
#   /dashboard  - HTML 看板页面（浏览器打开）
#   /stats      - JSON 实时节省统计
#   /stats-history - JSON/CSV 历史趋势
#   /health     - JSON 健康+配置
#   /readyz     - JSON 就绪检查
#   /livez      - JSON 存活检查
#   /quota      - JSON 配额/速率限制
#   /metrics    - Prometheus 纯文本指标
#   /subscription-window - JSON 订阅用量
#
# 注意：dashboard HTML 中 JS 硬编码了 /stats 等绝对路径
#       使用 sub_filter 改写响应内容，加上 /headroom/ 前缀
#       确保所有外部请求都走 /headroom/ 前缀，不污染其他业务路由
# ============================================================

upstream headroom_backend {
    server 127.0.0.1:8787;
    keepalive 64;
}

server {
    listen 192.168.8.5:80;
    server_name _;

    # ─── 安全暴露监控/统计端点（/headroom/ 前缀版）─────
    location ~ ^/headroom/(dashboard|stats|stats-history|health|readyz|livez|quota|metrics|subscription-window)$ {
        proxy_pass http://headroom_backend/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 改写 dashboard HTML 中 JS 硬编码的绝对路径 → 加上 /headroom/ 前缀
        # 这样浏览器 JS 请求 /headroom/stats 而非 /stats，安全走 Nginx
        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter "fetch('/stats" "fetch('/headroom/stats";
        sub_filter "fetch('/health" "fetch('/headroom/health";
        sub_filter "fetch('/stats-history" "fetch('/headroom/stats-history";
        sub_filter "fetch('/transformations/feed" "fetch('/headroom/transformations/feed";
    }

    # ─── /headroom 重定向到看板 ────────────────────
    location = /headroom {
        return 302 /headroom/dashboard;
    }

    # ─── 拒绝其他所有路径 ──────────────────────────
    location / {
        return 403;
    }
}
