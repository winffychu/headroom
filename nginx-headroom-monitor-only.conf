# ============================================================
# Nginx 配置：双实例 Headroom 监控端点
#
#  cache 实例（172.168.0.77:8787）— HEADROOM_MODE=cache
#  token 实例（172.168.0.76:8787）— HEADROOM_MODE=token
#
# 访问路径：
#   http://192.168.8.5/headroom/cache/dashboard
#   http://192.168.8.5/headroom/token/stats
#
# LLM 代理路由（/v1/*）不走 Nginx，仅本机访问
# ============================================================

# ─── 数据平面 ─────────────────────────────────────
upstream headroom_cache {
    server 172.168.0.77:8787;
    keepalive 64;
}

upstream headroom_token {
    server 172.168.0.76:8787;
    keepalive 64;
}

server {
    listen 192.168.8.5:80;
    server_name _;

    # ─── cache 实例（/headroom/cache/xxx）────────────
    location ~ ^/headroom/cache/(dashboard|stats|stats-history|health|readyz|livez|quota|metrics|subscription-window)$ {
        proxy_pass http://headroom_cache/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter "fetch('/stats" "fetch('/headroom/cache/stats";
        sub_filter "fetch('/health" "fetch('/headroom/cache/health";
        sub_filter "fetch('/stats-history" "fetch('/headroom/cache/stats-history";
        sub_filter "fetch('/transformations/feed" "fetch('/headroom/cache/transformations/feed";
    }

    # ─── token 实例（/headroom/token/xxx）────────────
    location ~ ^/headroom/token/(dashboard|stats|stats-history|health|readyz|livez|quota|metrics|subscription-window)$ {
        proxy_pass http://headroom_token/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter "fetch('/stats" "fetch('/headroom/token/stats";
        sub_filter "fetch('/health" "fetch('/headroom/token/health";
        sub_filter "fetch('/stats-history" "fetch('/headroom/token/stats-history";
        sub_filter "fetch('/transformations/feed" "fetch('/headroom/token/transformations/feed";
    }

    # ─── 重定向 ─────────────────────────────────────
    location = /headroom {
        return 302 /headroom/cache/dashboard;
    }

    location = /headroom/cache {
        return 302 /headroom/cache/dashboard;
    }

    location = /headroom/token {
        return 302 /headroom/token/dashboard;
    }

    # ─── 拒绝其他所有路径 ──────────────────────────
    location / {
        return 403;
    }
}
