# ============================================================
# Nginx 配置：双实例 Headroom 监控端点（map 模式）
#
#  cache 实例（172.168.0.77:8787）— HEADROOM_MODE=cache
#  token 实例（172.168.0.76:8787）— HEADROOM_MODE=token
#
# 访问路径：
#   http://192.168.8.5/headroom/cache/dashboard
#   http://192.168.8.5/headroom/token/stats
#
# LLM 代理路由（/v1/*）不走 Nginx，仅本机访问
# ============================================================

# map 根据 $1（cache/token）返回对应的 upstream 地址
map $1 $headroom_backend {
    default   172.168.0.77:8787;   # 默认走 cache
    cache     172.168.0.77:8787;
    token     172.168.0.76:8787;
}

server {
    listen 192.168.8.5:80;
    server_name _;

    # ─── 统一入口：一个 location 处理两个实例 ─────
    location ~ ^/headroom/(cache|token)/(dashboard|stats|stats-history|health|readyz|livez|quota|metrics|subscription-window)$ {
        proxy_pass http://$headroom_backend/$2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        sub_filter_types text/html;
        sub_filter_once off;
        sub_filter "fetch('/stats" "fetch('/headroom/$1/stats";
        sub_filter "fetch('/health" "fetch('/headroom/$1/health";
        sub_filter "fetch('/stats-history" "fetch('/headroom/$1/stats-history";
        sub_filter "fetch('/transformations/feed" "fetch('/headroom/$1/transformations/feed";
    }

    # ─── 重定向 ─────────────────────────────────────
    location = /headroom {
        return 302 /headroom/cache/dashboard;
    }

    location = /headroom/cache {
        return 302 /headroom/cache/dashboard;
    }

    location = /headroom/token {
        return 302 /headroom/token/dashboard;
    }

    # ─── 拒绝其他所有路径 ──────────────────────────
    location / {
        return 403;
    }
}
