# ============================================================
# Nginx 配置：仅暴露 Headroom 监控/统计端点
# 通过 http://192.168.8.5/headroom/xxx 访问
# LLM 代理路由（/v1/*）不走 Nginx，仅本机访问
# ============================================================

upstream headroom_backend {
    server 127.0.0.1:8787;
    keepalive 64;
}

server {
    listen 192.168.8.5:80;
    server_name _;

    # ─── 仅暴露安全的监控/统计端点 ─────────────────
    location /headroom/dashboard {
        proxy_pass http://headroom_backend/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/stats {
        proxy_pass http://headroom_backend/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/stats-history {
        proxy_pass http://headroom_backend/stats-history;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/health {
        proxy_pass http://headroom_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/readyz {
        proxy_pass http://headroom_backend/readyz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/livez {
        proxy_pass http://headroom_backend/livez;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/quota {
        proxy_pass http://headroom_backend/quota;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/metrics {
        proxy_pass http://headroom_backend/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /headroom/subscription-window {
        proxy_pass http://headroom_backend/subscription-window;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── 访问 /headroom 重定向到看板 ───────────────
    location = /headroom {
        return 302 /headroom/dashboard;
    }

    # ─── 拒绝所有其他路径 ───────────────────────────
    location / {
        return 403;
    }
}
