name: 🇨🇳 Migrate wiki-zh to GitHub Wiki
on:
  workflow_dispatch:  # 手动触发 - 点 GitHub UI 上的 Run workflow 按钮

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup git
        run: |
          git config --global user.name "winffychu"
          git config --global user.email "217700884+winffychu@users.noreply.github.com"

      - name: Try wiki migration
        run: |
          # 使用 gh 命令行（已预装）访问 wiki
          echo "尝试访问 wiki 仓库..."

          # 先尝试通过 gh api 获取 wiki 信息
          # GitHub 没有直接的 wiki API，但可以通过 web 界面创建

          # 方法：直接使用 git 推送到 wiki 仓库
          REPO="${{ github.repository }}"
          WIKI_GIT_URL="https://x-access-token:*** secrets.GITHUB_TOKEN }}@github.com/${REPO}.wiki.git"
          
          # 创建一个临时目录
          TMPDIR=$(mktemp -d)

          # 尝试克隆 wiki repo
          if git clone "$WIKI_GIT_URL" "$TMPDIR/wiki" 2>/dev/null; then
            echo "✅ Wiki 仓库已存在"
          else
            echo "⚠️ Wiki 仓库不存在，尝试创建..."
            # 创建首页来初始化 wiki
            mkdir -p "$TMPDIR/wiki"
            cd "$TMPDIR/wiki"
            git init
            echo "# Headroom Wiki 中文文档" > Home.md
            git add Home.md
            git commit -m "初始化 Wiki"
            git remote add origin "$WIKI_GIT_URL"
            if git push -u origin master 2>/dev/null; then
              echo "✅ Wiki 仓库创建成功！"
            else
              echo "❌ 无法自动创建 Wiki 仓库。"
              echo "请手动访问: https://github.com/${REPO}/wiki"
              echo "创建第一个页面后，重新运行此 workflow。"
              exit 1
            fi
            cd "$TMPDIR"
          fi

          # 复制 wiki-zh 内容
          rm -f "$TMPDIR/wiki/"*.md "$TMPDIR/wiki/"*.yml 2>/dev/null || true
          cp wiki-zh/*.md "$TMPDIR/wiki/"
          
          cd "$TMPDIR/wiki"
          git add -A
          if git diff --cached --quiet; then
            echo "没有变更"
          else
            git commit -m "导入中文 Wiki 内容"
            git push
            echo "✅ 中文 Wiki 迁移完成！"
            echo "访问: https://github.com/${REPO}/wiki"
          fi
