version: "3.8"

services:
  # ─── token 实例：占率高压缩（proxy+code，distroless） ──
  headroom-token:
    image: ghcr.io/winffychu/headroom:code-slim-nonroot
    container_name: headroom-token
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      ANTHROPIC_TARGET_API_URL: "https://sub2api.example.com"
      OPENAI_TARGET_API_URL: "https://new-api.example.com/v1"
      HEADROOM_HOST: "0.0.0.0"
      HEADROOM_PORT: "8787"
      HEADROOM_MODE: "token"
      HEADROOM_TARGET_RATIO: "0.5"
      HEADROOM_OUTPUT_SHAPER: "1"
      HEADROOM_VERBOSITY_LEVEL: "2"
      HEADROOM_MECHANICAL_EFFORT: "low"
      HEADROOM_BUDGET: "100.0"
      HEADROOM_BUDGET_PERIOD: "daily"
      HEADROOM_CCR_BACKEND: "sqlite"
      HEADROOM_CCR_TTL_SECONDS: "3600"
    volumes:
      - headroom-token-data:/home/nonroot/.headroom
    healthcheck:
      test: ["CMD-SHELL", "python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/readyz', timeout=5)""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ─── cache 实例：零质量风险（纯 proxy，distroless） ──
  headroom-cache:
    image: ghcr.io/winffychu/headroom:slim-nonroot
    container_name: headroom-cache
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8787"
    environment:
      ANTHROPIC_TARGET_API_URL: "https://sub2api.example.com"
      OPENAI_TARGET_API_URL: "https://new-api.example.com/v1"
      HEADROOM_HOST: "0.0.0.0"
      HEADROOM_PORT: "8787"
      HEADROOM_MODE: "cache"
      HEADROOM_OUTPUT_SHAPER: "1"
      HEADROOM_VERBOSITY_LEVEL: "2"
      HEADROOM_BUDGET: "100.0"
      HEADROOM_BUDGET_PERIOD: "daily"
    volumes:
      - headroom-cache-data:/home/nonroot/.headroom
    healthcheck:
      test: ["CMD-SHELL", "python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/readyz', timeout=5)""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  headroom-token-data:
  headroom-cache-data:
